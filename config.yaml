server:
  host: "127.0.0.1"
  port: 13243

security:
  modelport_token: "MODELPORT_TOKEN"

database:
  url: "sqlite:///./data/modelport.db"

defaults:
  input_format: "anthropic"
  provider: "openrouter"
  model: "claude-sonnet"

providers:
  openai:
    type: "openai_compatible"
    display_name: "OpenAI"
    base_url: "https://api.openai.com/v1"
    api_key_env: "OPENAI_API_KEY"

  anthropic:
    type: "anthropic_compatible"
    display_name: "Anthropic"
    base_url: "https://api.anthropic.com"
    api_key_env: "ANTHROPIC_API_KEY"

  gemini:
    type: "openai_compatible"
    display_name: "Gemini"
    base_url: "https://generativelanguage.googleapis.com/v1beta/openai"
    api_key_env: "GEMINI_API_KEY"

  openrouter:
    type: "openai_compatible"
    display_name: "OpenRouter"
    base_url: "https://openrouter.ai/api/v1"
    api_key_env: "OPENROUTER_API_KEY"

  ollama:
    type: "openai_compatible"
    display_name: "Ollama"
    base_url: "http://localhost:11434/v1"
    api_key_env: null

model_aliases:
  # OpenAI
  gpt:
    provider: "openai"
    model: "gpt-5.5"
    description: "Default flagship OpenAI model"

  gpt-fast:
    provider: "openai"
    model: "gpt-5.4-mini"
    description: "Fast lower-cost OpenAI model"

  gpt-balanced:
    provider: "openai"
    model: "gpt-5.4"
    description: "Balanced OpenAI model for coding and reasoning"

  # Anthropic
  claude:
    provider: "anthropic"
    model: "claude-sonnet-4-6"
    description: "Default Anthropic model"

  claude-sonnet:
    provider: "anthropic"
    model: "claude-sonnet-4-6"
    description: "Best speed/intelligence balance from Anthropic"

  claude-opus:
    provider: "anthropic"
    model: "claude-opus-4-7"
    description: "Most capable Anthropic model"

  claude-fast:
    provider: "anthropic"
    model: "claude-haiku-4-5"
    description: "Fastest Anthropic model"

  # Gemini
  gemini:
    provider: "gemini"
    model: "gemini-3.5-flash"
    description: "Default Gemini OpenAI-compatible model"

  gemini-flash:
    provider: "gemini"
    model: "gemini-3.5-flash"
    description: "Fast Gemini model via OpenAI compatibility"

  # Local / fallback
  local:
    provider: "ollama"
    model: "qwen2.5-coder"
    description: "Local coding model through Ollama"
    